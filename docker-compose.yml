# Pull the pre-built image from GHCR — no build step, so it works on any Docker
# host and avoids Portainer's in-app BuildKit build session (which can fail with
# an http2/gRPC "frame too large" error). Published by .github/workflows/docker-publish.yml
#
# To BUILD locally instead of pulling:
#   docker compose -f docker-compose.build.yml up -d --build
services:
  meshcommander:
    image: ghcr.io/xhico/meshcommander:latest
    container_name: meshcommander
    ports:
      - "3000:3000"          # open http://<host>:3000
    restart: unless-stopped
    pull_policy: always      # grab the latest published image on each (re)deploy
